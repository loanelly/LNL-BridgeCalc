<svg xmlns="http://w3.org" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Сглаженный современный щит безопасности -->
  <path d="M60,14 C78,14 94,20 100,28 C100,56 90,84 60,104 C30,84 20,56 20,28 C26,20 42,14 60,14 Z" 
        fill="#1E293B" stroke="#38BDF8" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Параболический вантовый кабель моста (символ инженерии) -->
  <path d="M28,45 Q60,85 92,45" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-dasharray="2,2"/>
  
  <!-- Вертикальные подвесы, формирующие сетку -->
  <line x1="44" y1="52" x2="44" y2="70" stroke="#38BDF8" stroke-width="1.5"/>
  
  <!-- Инженерная стрелка вектора силы, уходящая вверх (символ прочности) -->
  <g transform="translate(60,62)">
    <line x1="0" y1="18" x2="0" y2="-22" stroke="#4ADE80" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M-6,-14 L0,-24 L6,-14" fill="none" stroke="#4ADE80" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Текст Ksafe (Символ стабильности софта) -->
  <text x="60" y="52" fill="#4ADE80" font-family="Arial, sans-serif" font-weight="900" font-size="15" text-anchor="middle">K</text>
  <text x="60" y="94" fill="#64748B" font-family="Arial, sans-serif" font-weight="bold" font-size="7" text-anchor="middle" letter-spacing="1">LNL</text>
</svg>
